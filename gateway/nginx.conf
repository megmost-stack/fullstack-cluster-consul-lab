# Benutzerdefiniertes Log-Format für besseres Debugging
log_format upstream_logging '[$time_local] $remote_addr - $remote_user - $server_name '
                            'to: $upstream_addr: $request upstream_status: $upstream_status '
                            'upstream_response_time: $upstream_response_time';
server {
    listen 80;

    # Das neue Log-Format aktivieren
    access_log /var/log/nginx/access.log upstream_logging;

    # Consul als DNS-Resolver definieren
    resolver 172.18.0.2 valid=5s;

    # 1. Frontend
    location / {
        set $frontend_upstream http://frontend.service.consul;
        proxy_pass $frontend_upstream;
        proxy_set_header Host $host;
    }

    # 2. Backend API
    location /api/ {
	# Wir bauen die Ziel-URL dynamisch zusammen
	set $backend_url http://backend.service.consul:3000;

        rewrite ^/api/(.*)$ /$1 break;

        # Hier darf absolut kein Port stehen
	proxy_pass $backend_url;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 3. Adminer
    location /adminer/ {
	# Wir entfernen den abschließenden Slash beim proxy_pass NICHT, 
        # damit Nginx den Pfad exakt so weitergibt, wie er kommt.
        set $adminer_service adminer.service.consul;
        proxy_pass http://$adminer_service:8080; 

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WICHTIG: Da Adminer intern auf / reagiert, wir aber /adminer/ senden:
        # Wir schreiben die URL intern um, bevor wir sie an Adminer geben.
        rewrite ^/adminer/(.*) /$1 break;

        # WICHTIG: Alle Redirects von Adminer (die auf / gehen) wieder einfangen
        proxy_redirect / /adminer/;
        
        # WICHTIG: Die Cookies müssen für den Browser auf /adminer/ gemappt werden
        proxy_cookie_path / /adminer/; 
    }
}
